<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจนับเวร - ระบบตรวจนับและตัดจ่ายยาเสพติดให้โทษ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="icon-app.png">
  <link rel="apple-touch-icon" href="icon-app.png">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder"></div>

  <div class="main-wrapper">
    <div class="row g-4">
      
      <!-- Shift Count Form -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm p-4 h-100" style="border-radius: 12px;">
          <h3 class="mb-3 text-primary"><i class="fas fa-clipboard-list me-2"></i>ตรวจนับยาประจำเวร</h3>
          <p class="text-secondary small mb-4">ตรวจเช็คยอดปริมาณยาเสพติดประจำเวรเพื่อป้องกันการสูญหาย</p>
          
          <form id="shift-count-form">
            <div class="row g-3">
              <div class="col-12">
                <label for="count-shift-select" class="form-label">เลือกเวรปฏิบัติการ</label>
                <select class="form-select" id="count-shift-select" required>
                  <option value="" disabled selected>-- เลือกเวร --</option>
                  <option value="เช้า">เวรเช้า (08:00 - 16:00)</option>
                  <option value="บ่าย">เวรบ่าย (16:00 - 24:00)</option>
                  <option value="ดึก">เวรดึก (00:00 - 08:00)</option>
                </select>
              </div>
              <div class="col-12">
                <label for="count-drug-select" class="form-label">เลือกชนิดยาเสพติด</label>
                <select class="form-select" id="count-drug-select" required>
                  <option value="" disabled selected>-- เลือกยา --</option>
                </select>
                <div class="form-text text-secondary" id="shift-remain-hint" style="font-size: 0.85rem;">ยอดเป้าหมาย Stock Ward: - แอมป์/ขวด</div>
              </div>
              <div class="col-12">
                <label for="amp-remain-input" class="form-label">จำนวนแอมป์คงดี (พร้อมใช้)</label>
                <input type="number" min="0" step="any" class="form-control" id="amp-remain-input" placeholder="กรอกจำนวนแอมป์ที่สมบูรณ์" required>
              </div>
              <div class="col-12">
                <label for="empty-amp-input" class="form-label">จำนวนแอมป์เปล่า (ใช้แล้วรอทำลาย)</label>
                <input type="number" min="0" step="any" class="form-control" id="empty-amp-input" placeholder="กรอกจำนวนหลอดเปล่า" required>
              </div>
              <div class="col-12">
                <label for="count-user-input" class="form-label">ผู้ตรวจนับ</label>
                <input type="text" class="form-control" id="count-user-input" placeholder="กรอกชื่อผู้ตรวจนับ" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 mt-4">
              <i class="fas fa-check-double me-2"></i>บันทึกและส่งตรวจเช็คยอด
            </button>
          </form>
        </div>
      </div>
      
      <!-- Shift Count History Table -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm p-4 h-100" style="border-radius: 12px;">
          <h3 class="mb-3 text-primary"><i class="fas fa-list-check me-2"></i>ประวัติการตรวจนับยาประจำเวร</h3>
          <p class="text-secondary small mb-4">แสดงผลการเปรียบเทียบยอดรวม (แอมป์คงดี + แอมป์เปล่า) กับสต็อกยาปัจจุบัน</p>
          
          <div class="table-responsive" style="box-shadow: none;">
            <table id="shift-count-table" class="table table-hover align-middle w-100 mb-0">
              <thead>
                <tr>
                  <th>วันที่</th>
                  <th>เวร</th>
                  <th>ชื่อยา</th>
                  <th>แอมป์ดี</th>
                  <th>แอมป์เปล่า</th>
                  <th>ยอดรวมนับได้</th>
                  <th>ผลตรวจสอบ</th>
                  <th>ผู้ตรวจ</th>
                </tr>
              </thead>
              <tbody id="shift-count-tbody">
                <!-- ข้อมูลจะโหลดเข้าด้วย JavaScript -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Loading Spinner -->
  <div id="loading-spinner-overlay" class="d-none">
    <div class="spinner-border spinner-custom" role="status">
      <span class="visually-hidden">กำลังโหลด...</span>
    </div>
  </div>

  <!-- JQuery & Bootstrap & Datatables & Sweetalert2 -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script src="fixes.js"></script>
</body>
</html>
